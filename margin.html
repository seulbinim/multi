<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>margin</title>
  <style>
    .container{
      background: yellow;
      width: 500px;
      margin: 0 auto;
      display: flex;
      flex-flow: column nowrap;

      div{
        background: lightgreen;
        margin-block: 20px;
      }

      .box2{
        background: pink;
        margin-inline: -50px;
        margin-block: -20px;
      }
    }


  </style>
</head>
<body>
  <div class="container">
    <div class="box1">박스1</div>
    <div class="box2">박스2</div>
    <div class="box3">박스3</div>
    <div class="box4">박스4</div>
  </div>
</body>
</html>
