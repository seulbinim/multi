<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>반응형 iframe</title>
  <style>
    .youtube{
      background-color: yellow;
      width: 50%;

      & figure{
        margin: 0;
        position: relative;
        padding-block-start: 56.25%;
      }

      & iframe{
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="youtube">
    <h2 class="a11yHidden">홍보영상</h2>
    <figure>
      <iframe width="560" height="315" src="https://www.youtube.com/embed/pWCANzXQCzc?si=1KW96-MU55_CmjAw" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      <figcaption class="a11yHidden">3년연속 2관왕 달성</figcaption>
    </figure>
  </div>
</body>
</html>
